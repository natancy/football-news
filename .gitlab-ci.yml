stages:
  - test
  - deploy

test:
  image: docker-registry.int.rclabenv.com:443/node:22-alpine
  stage: test
  script:
    - npm test
  rules:
    - if: $CI_COMMIT_BRANCH

pages:
  image: docker-registry.int.rclabenv.com:443/alpine:3.20
  stage: deploy
  needs:
    - job: test
  script:
    - mkdir -p public
    - cp index.html styles.css public/
    - cp -R src public/src
    - cp README.md SPEC.md ARCHITECTURE.md RETROSPECTIVE.md public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
